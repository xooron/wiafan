<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiaFan Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --dim: rgba(255, 255, 255, 0.4);
            --speed: 0.6s;
            --bezier: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100%;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000 100%);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.02);
            filter: blur(100px);
            border-radius: 50%;
            animation: move 25s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(30%, 30%); }
        }

        /* Контейнер */
        .wrapper {
            width: 100%;
            max-width: 900px; /* Оптимально для ПК */
            margin: 0 auto;
            padding: 40px 20px 160px;
            animation: fadeIn 1s var(--bezier);
        }

        /* Шапка */
        .profile {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 60px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 30px; /* Квадрат с закруглением */
            object-fit: cover;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .nick-box h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin: 0;
            font-weight: 900;
            letter-spacing: -2px;
        }

        .role {
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Список треков */
        .track-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        /* На ПК делаем в 2 колонки */
        @media (min-width: 768px) {
            .track-list { grid-template-columns: 1fr 1fr; }
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: var(--speed) var(--bezier);
            cursor: pointer;
        }

        .track-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.3);
        }

        .track-img {
            width: 50px;
            height: 50px;
            background: #111;
            border-radius: 12px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #333;
        }

        .track-info { flex: 1; }
        .t-title { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
        .t-author { font-size: 0.75rem; color: var(--dim); }

        .btn-play-mini {
            width: 35px;
            height: 35px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-play-mini svg { width: 14px; fill: #000; }

        /* Плеер-панель */
        .player-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(200px);
            width: 95%;
            max-width: 600px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 20px 25px;
            transition: transform 0.8s var(--bezier);
            z-index: 1000;
        }

        .player-bar.active { transform: translateX(-50%) translateY(0); }

        .player-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* Контролы */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .btn-main {
            background: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .btn-play-pause { width: 55px; height: 55px; }
        .btn-step { 
            width: 40px; 
            height: 40px; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid var(--glass-border);
        }
        .btn-step svg { width: 18px; fill: #fff; }
        .btn-play-pause svg { width: 22px; fill: #000; }

        .btn-step:hover { background: rgba(255,255,255,0.2); }

        /* Прогресс */
        .prog-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }
        .prog-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px #fff;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--dim);
            margin-top: 6px;
        }

        /* Громкость */
        .vol-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .vol-group svg { width: 16px; fill: #fff; }

        input[type=range] {
            -webkit-appearance: none;
            width: 70px;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 2px;
            background: rgba(255,255,255,0.2);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 10px;
            width: 10px;
            border-radius: 50%;
            background: #fff;
            margin-top: -4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="blob"></div>
    </div>

    <div class="wrapper">
        <header class="profile">
            <img src="https://cdn.discordapp.com/attachments/1425488136317702225/1493477980318466108/IMG_7037.jpg?ex=69df1d41&is=69ddcbc1&hm=4ee5558289f8cd59d80c3c482ead5d10695990c20c43f62104f7fdd34d7c35d7&" class="avatar">
            <div class="nick-box">
                <h1>WiaFan</h1>
                <div class="role">Исполнитель</div>
            </div>
        </header>

        <div class="track-list" id="trackList">
            <!-- JS Render -->
        </div>
    </div>

    <!-- Панель управления -->
    <div class="player-bar" id="playerBar">
        <div class="player-top">
            <div class="info">
                <div class="t-title" id="pTitle" style="font-size: 0.9rem;">Track</div>
                <div class="t-author" style="font-size: 0.7rem;">WiaFan</div>
            </div>
            <div class="vol-group">
                <!-- Иконка звука -->
                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <input type="range" id="volRange" min="0" max="1" step="0.1" value="0.8">
            </div>
        </div>

        <div class="prog-container" id="progBar">
            <div class="prog-fill" id="progFill"></div>
        </div>
        <div class="time-row">
            <span id="curTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>

        <div class="controls">
            <!-- Назад -->
            <button class="btn-main btn-step" onclick="prevTrack()">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <!-- Плей / Пауза -->
            <button class="btn-main btn-play-pause" id="playBtn">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>

            <!-- Вперед -->
            <button class="btn-main btn-step" onclick="nextTrack()">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const tracks = [
            { id: 0, title: "QQQQ", file: "QQQQ.mp3" },
            { id: 1, title: "Alone Forever", file: "Alone_Forever.mp3" },
            { id: 2, title: "Сон", file: "Son.mp3" },
            { id: 3, title: "Мб Мб", file: "Mb_Mb.mp3" }
        ];

        let curIdx = 0;
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const progFill = document.getElementById('progFill');
        const playerBar = document.getElementById('playerBar');

        // Рендер списка
        const trackList = document.getElementById('trackList');
        tracks.forEach((t, index) => {
            const el = document.createElement('div');
            el.className = 'track-item';
            el.innerHTML = `
                <div class="track-img">WIA</div>
                <div class="track-info">
                    <div class="t-title">${t.title}</div>
                    <div class="t-author">WiaFan</div>
                </div>
                <div class="btn-play-mini"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
            `;
            el.onclick = () => loadTrack(index);
            trackList.appendChild(el);
        });

        function loadTrack(index) {
            curIdx = index;
            const t = tracks[curIdx];
            document.getElementById('pTitle').innerText = t.title;
            audio.src = t.file;
            audio.play();
            playerBar.classList.add('active');
            updateIcon(true);
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                updateIcon(true);
            } else {
                audio.pause();
                updateIcon(false);
            }
        }

        playBtn.onclick = togglePlay;

        function updateIcon(isPlaying) {
            playIcon.innerHTML = isPlaying 
                ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' 
                : '<path d="M8 5v14l11-7z"/>';
        }

        function nextTrack() {
            curIdx = (curIdx + 1) % tracks.length;
            loadTrack(curIdx);
        }

        function prevTrack() {
            curIdx = (curIdx - 1 + tracks.length) % tracks.length;
            loadTrack(curIdx);
        }

        // События аудио
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progFill.style.width = pct + '%';
            document.getElementById('curTime').innerText = fmt(audio.currentTime);
            if(audio.duration) document.getElementById('totalTime').innerText = fmt(audio.duration);
        };

        audio.onended = nextTrack;

        document.getElementById('progBar').onclick = (e) => {
            const w = document.getElementById('progBar').clientWidth;
            audio.currentTime = (e.offsetX / w) * audio.duration;
        };

        document.getElementById('volRange').oninput = (e) => audio.volume = e.target.value;

        function fmt(s) {
            let m = Math.floor(s/60);
            let sc = Math.floor(s%60);
            return m + ":" + (sc < 10 ? "0"+sc : sc);
        }
    </script>
</body>
</html>
